name: Refresh quotidien → Cloudflare Pages

# Ré-ingère l'Open Data AN, régénère les JSON statiques, rebuild la PWA web et
# déploie sur Cloudflare Pages. L'AN publie un dump complet → ré-ingestion idempotente.
on:
  schedule:
    # 05:10 UTC ≈ 06:10/07:10 Paris (après publication AN). Cron en UTC.
    - cron: "10 5 * * *"
  workflow_dispatch: {} # lancement manuel depuis l'onglet Actions

# Une seule exécution à la fois ; on n'annule pas un déploiement en cours.
concurrency:
  group: refresh
  cancel-in-progress: false

permissions:
  contents: read
  issues: write # pour ouvrir une issue d'alerte si le refresh échoue

# NB : EXPO_PUBLIC_DATA_BASE est posée UNIQUEMENT sur l'étape de build (voir plus bas),
# PAS en env global : les tests de recherche comptent sur des fetch de données qui
# échouent en Node (repli lexical/sémantique) — une base joignable les ferait dériver.

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      # Persiste data/raw (zips + sidecars .etag) entre exécutions → le gros
      # Amendements.json.zip (~270 Mo) n'est re-téléchargé que s'il a changé (ETag 304).
      # Clé unique par run pour toujours sauvegarder ; restore-keys récupère le dernier cache.
      - name: Cache des données brutes AN (data/raw)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: data/raw
          key: raw-${{ github.run_id }}
          restore-keys: |
            raw-

      # Cache du modèle d'embeddings e5-small (~118 Mo) HORS node_modules → réutilisé
      # entre runs (sinon re-téléchargé depuis HF à chaque fois). Clé stable (le modèle
      # ne change pas tant que EMBED_MODEL/VERSION ne bougent pas).
      - name: Cache du modèle d'embeddings (.hf-cache)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .hf-cache
          key: hf-e5-small-v1

      - name: Installer les dépendances (pipeline)
        working-directory: pipeline
        run: npm ci

      # Garde : typecheck + tests purs (stats = chiffres politiques, score = proximité,
      # recherche = normalisation/alias/intention/dédup/repli). Rapides et déterministes
      # → bloque un déploiement si le code est cassé. (Le test sémantique, plus lent,
      # se lance à la main.)
      - name: Garde — typecheck + tests (stats, score, recherche)
        working-directory: pipeline
        run: npx tsc --noEmit && npm test

      - name: Ré-ingestion (téléchargement conditionnel ETag)
        working-directory: pipeline
        run: npm run ingest:refresh

      - name: Export statique (JSON → app/public/data + version.json)
        working-directory: pipeline
        run: npm run export:static

      # Index d'embeddings pour la recherche sémantique : lit votes.db, écrit
      # app/public/data/embeddings.bin + meta. Télécharge le modèle dans .hf-cache
      # (mis en cache ci-dessus). build:web (prepare:embeddings) copiera ensuite le
      # modèle/runtime/bundle depuis .hf-cache + node_modules vers public/.
      - name: Index d'embeddings (recherche sémantique)
        working-directory: pipeline
        run: npm run embeddings

      - name: Installer les dépendances (app)
        working-directory: app
        run: npm ci

      - name: Build web + patch PWA (manifest/SW dans dist)
        working-directory: app
        env:
          # Origine des données : projet Pages DÉDIÉ « scrutoir-data » (plafond Cloudflare
          # de 20 000 fichiers PAR projet). Bakée dans le bundle par `expo export` ; le SW
          # (DATA_ORIGINS) et la CSP (connect-src) l'autorisent.
          EXPO_PUBLIC_DATA_BASE: https://data.scrutoir.fr
        run: npm run build:web

      # Garde anti-régression : refuse de déployer des données plus anciennes ou plus
      # pauvres que la prod (les seuils statiques de l'export ne suffisent pas —
      # incident déjà vécu sur un déploiement manuel).
      - name: Garde anti-régression des données (version.json local vs prod)
        working-directory: app
        run: node scripts/check-data-freshness.mjs

      # Deux sites Pages : dist/data → .data-site (+ _headers CORS), dist reste l'app.
      - name: Séparer les données du site app
        working-directory: app
        run: node scripts/split-data-site.mjs

      # 1/2 — les DONNÉES d'abord : les pages SEO fraîchement générées référencent des
      # scrutins qui doivent déjà exister côté data quand l'app est publiée.
      - name: Déployer les données (projet scrutoir-data)
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy app/.data-site --project-name=scrutoir-data --branch=main

      # 2/2 — l'app (bundle + pages SEO), sans /data.
      - name: Déployer l'app (projet scrutoir)
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy app/dist --project-name=scrutoir --branch=main

      # Alerte : si une étape a échoué (garde-fou, téléchargement, build, déploiement),
      # on ouvre une issue GitHub. Rien n'a été déployé → l'app en ligne reste intacte.
      - name: Alerte si échec
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const jour = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Refresh quotidien en échec — ${jour}`,
              body: `Le rafraîchissement automatique a échoué (run #${context.runId}).\n\n`
                + `Les données **n'ont pas été déployées** : l'application en ligne reste sur la dernière version saine.\n\n`
                + `👉 Logs : ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
