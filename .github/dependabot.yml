version: 2
updates:
  # Dépendances de l'app (Expo / React Native web)
  - package-ecosystem: npm
    directory: /app
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies"]

  # Dépendances du pipeline d'ingestion
  - package-ecosystem: npm
    directory: /pipeline
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies"]

  # Versions des actions GitHub utilisées dans les workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: ["dependencies"]
